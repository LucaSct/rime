# SPDX-License-Identifier: Apache-2.0
# rime-protocol — a hand-rolled Rust implementation of the Rime streaming/editor wire protocol
# (engine/stream, Track S + M9/ADR-0016). It mirrors the C++ reference field-by-field so the editor
# (a client of a live engine process) can speak the exact same bytes; a cross-language conformance
# test (tests/conformance.rs) checks that byte-for-byte against fixtures the C++ side emits.
#
# Deliberately dependency-free in v1: the editor channel is all fixed-layout little-endian integers,
# which std handles. The LZ4 pixel decode for the streamed viewport (an external lz4 crate) lands with
# the viewport panel, not here.
[package]
name = "rime-protocol"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Rust implementation of the Rime streaming/editor wire protocol (mirrors engine/stream)"

[dependencies]
# LZ4 block decode for the editor's streamed viewport frames (the lossless local codec, engine/stream
# uses liblz4's LZ4_compress_default — the same raw block format lz4_flex::block reads). Pure Rust, no
# system lib. The editor CHANNEL stays dependency-free; only frame pixel decode needs this.
lz4_flex = { version = "0.11", default-features = false, features = ["safe-decode"] }

[lints.clippy]
all = "deny"
