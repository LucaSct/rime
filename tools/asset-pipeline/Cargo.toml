# asset-pipeline — the offline (Rust) half of Rime's asset pipeline: import source assets and
# cook them into the engine's runtime RMA1 format (ADR-0024). It is the *writer* of record for
# the cooked container; the C++ engine/assets module is the reader. Files are the boundary
# (ADR-0001): nothing here links the engine, and nothing in the engine parses glTF.
[package]
name = "asset-pipeline"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Rime offline asset pipeline: import source assets (glTF) and cook them to RMA1."

[dependencies]
# glTF 2.0 import. Apache-2.0/MIT (ship-safe). Default features include the `import` loader and the
# `utils` accessor readers we use to pull positions/normals/uvs/indices.
gltf = "1.4"
# Image decode for texture cook (M6.3). MIT/Apache-2.0 (ship-safe). default-features off so we pull
# only the PNG and JPEG decoders v1 supports — not the whole format zoo — keeping the tree lean and
# the cook deterministic. New source formats become new features here, not new dependencies.
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
# Tangent generation for normal mapping (M6.4). MIT/Apache-2.0 (ship-safe). The Rust port of Morten
# Mikkelsen's MikkTSpace — the *de-facto interchange convention* glTF specifies for generating
# tangents when a mesh omits them (ADR-0024 §5). Using it means our tangents match the basis normal
# maps are authored against; the derivation is written up in docs/math/tangent-space.md.
mikktspace = "0.3"
