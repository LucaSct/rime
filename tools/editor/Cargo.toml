# SPDX-License-Identifier: Apache-2.0
# editor — the Rime editor (M9): a client of a live engine process (ADR-0016). It launches
# `rime-engine --editor-host`, connects over the local socket, and edits the world through the
# reflection-described editor channel (rime-protocol). v1 ships the headless `--smoke` end-to-end
# check; the egui docking shell + streamed viewport follow (Mac-eyeballed per ADR-0031).
[package]
name = "editor"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "The Rime editor — a client of a live engine process (M9)"

[[bin]]
name = "editor"
path = "src/main.rs"

[features]
# The interactive egui docking shell (eframe → egui/egui_dock + wgpu/winit). Off by default so the
# headless `editor --smoke` — the CI-critical path — stays a light, fast build with no windowing
# stack. Turn it on to build/run the real editor: `cargo run -p editor --features gui`.
default = []
gui = ["dep:eframe", "dep:egui_dock"]

[dependencies]
rime-protocol = { path = "../rime-protocol" }
eframe = { version = "0.31", optional = true }
egui_dock = { version = "0.16", optional = true }

[lints.clippy]
all = "deny"
