# Rime CI — the Milestone-0 proof: the project builds and tests green on Windows, Linux,
# and macOS, and passes the format / lint / license gates. "Power > portability" still
# means all three OSes are gated from day one (VISION #2, ROADMAP ordering principle #4).
name: CI

on:
  push:
    # main AND long-lived feature branches. feat/icem-viewer once accumulated 57 commits
    # that never saw CI (pushed without a PR) — a branch must not be able to do that
    # silently again, so feature-branch pushes build too.
    branches: [main, "feat/**"]
  pull_request:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # one OS failing shouldn't hide the others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # CMake + Ninja on every OS (our presets use the Ninja generator).
      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      # Ninja needs cl.exe on PATH on Windows; this exports the MSVC env for later steps.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: |
          pip install "conan>=2,<3"
          conan profile detect --force

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # The native Linux window backends link against the system windowing libraries: X11/Xlib,
      # plus Wayland (wayland-client + wayland-scanner for the xdg-shell protocol) and xkbcommon for
      # Wayland keyboards. macOS/Windows use OS frameworks already present on their runners.
      #
      # We also install a Vulkan *runtime* here so the M3 "first pixels" proof actually runs on this
      # GPU-less runner: mesa-vulkan-drivers provides lavapipe (a software Vulkan 1.3 device, auto-
      # discovered by the loader libvulkan1), and vulkan-validationlayers gives the debug build its
      # validation. RIME_REQUIRE_VULKAN=1 makes the rhi tests treat "no device" as a failure (so a
      # broken driver can't pass as green) — set for Linux only, where we know an ICD is present.
      # (The Vulkan *build* deps — headers/volk/VMA/glslang — come from Conan, not apt.)
      - name: Install Linux deps (windowing + Vulkan runtime)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev libwayland-bin wayland-protocols \
            mesa-vulkan-drivers libvulkan1 vulkan-tools vulkan-validationlayers
          echo "RIME_REQUIRE_VULKAN=1" >> "$GITHUB_ENV"

      # One command builds + tests both halves (see scripts/build.{sh,ps1}). Running the
      # dev scripts here is what keeps them honest across all three OSes.
      #
      # M3 note: the Vulkan backend builds and link-checks on all three OSes (the M2.1-style proof);
      # the rhi *render* proof (off-screen triangle, pixel-verified) runs where an ICD is present —
      # enforced on Linux via lavapipe (RIME_REQUIRE_VULKAN=1 above). On macOS/Windows there is no ICD
      # on the runner, so the rhi tests skip (create_device returns null) — the backend is still
      # proven to compile and link. Running the proof on macOS/MoltenVK + Windows/SwiftShader is a
      # tracked follow-up (M3.4+).
      - name: Build & test (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/build.sh

      - name: Build & test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build.ps1

  lint:
    name: format, lint & license
    runs-on: ubuntu-latest # style/lint are OS-independent — check once.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Pinned so formatting is deterministic and matches what we run locally.
      - name: Install clang-format
        run: pip install "clang-format==20.1.8"

      - name: C++ formatting (clang-format)
        run: find engine tests \( -name '*.cpp' -o -name '*.hpp' -o -name '*.mm' \) -exec clang-format --dry-run --Werror {} +

      - name: Rust formatting (cargo fmt)
        working-directory: tools
        run: cargo fmt --all -- --check

      - name: Rust lints (clippy)
        working-directory: tools
        run: cargo clippy --all-targets -- -D warnings

      - name: License headers (SPDX)
        run: ./scripts/check-license-headers.sh
