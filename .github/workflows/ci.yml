# Rime CI — the Milestone-0 proof: the project builds and tests green on Windows, Linux,
# and macOS, and passes the format / lint / license gates. "Power > portability" still
# means all three OSes are gated from day one (VISION #2, ROADMAP ordering principle #4).
name: CI

on:
  push:
    # main AND long-lived feature branches. feat/icem-viewer once accumulated 57 commits
    # that never saw CI (pushed without a PR) — a branch must not be able to do that
    # silently again, so feature-branch pushes build too.
    branches: [main, "feat/**"]
  pull_request:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # one OS failing shouldn't hide the others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # CMake + Ninja on every OS (our presets use the Ninja generator).
      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      # Ninja needs cl.exe on PATH on Windows; this exports the MSVC env for later steps.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: |
          pip install "conan>=2,<3"
          conan profile detect --force

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # The native Linux window backends link against the system windowing libraries: X11/Xlib,
      # plus Wayland (wayland-client + wayland-scanner for the xdg-shell protocol) and xkbcommon for
      # Wayland keyboards. macOS/Windows use OS frameworks already present on their runners.
      #
      # We also install a Vulkan *runtime* here so the M3 "first pixels" proof actually runs on this
      # GPU-less runner: mesa-vulkan-drivers provides lavapipe (a software Vulkan 1.3 device, auto-
      # discovered by the loader libvulkan1), and vulkan-validationlayers gives the debug build its
      # validation. RIME_REQUIRE_VULKAN=1 makes the rhi tests treat "no device" as a failure (so a
      # broken driver can't pass as green) — set for Linux only, where we know an ICD is present.
      # (The Vulkan *build* deps — headers/volk/VMA/glslang — come from Conan, not apt.)
      - name: Install Linux deps (windowing + Vulkan runtime)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev libwayland-bin wayland-protocols \
            mesa-vulkan-drivers libvulkan1 vulkan-tools vulkan-validationlayers
          echo "RIME_REQUIRE_VULKAN=1" >> "$GITHUB_ENV"

      # One command builds + tests both halves (see scripts/build.{sh,ps1}). Running the
      # dev scripts here is what keeps them honest across all three OSes.
      #
      # M3 note: the Vulkan backend builds and link-checks on all three OSes (the M2.1-style proof);
      # the rhi *render* proof (off-screen triangle, pixel-verified) runs where an ICD is present —
      # enforced on Linux via lavapipe (RIME_REQUIRE_VULKAN=1 above). On macOS/Windows there is no ICD
      # on the runner, so the rhi tests skip (create_device returns null) — the backend is still
      # proven to compile and link. Running the proof on macOS/MoltenVK + Windows/SwiftShader is a
      # tracked follow-up (M3.4+).
      - name: Build & test (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/build.sh

      - name: Build & test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build.ps1

  # ── Sanitizer jobs (Phase 0.3) ──────────────────────────────────────────────────────
  # Two Linux-only jobs that instrument the C++ engine and run its tests under a sanitizer.
  # They exist to guard the hand-rolled lock-free code — the Chase-Lev work-stealing deque
  # and the JobSystem built on it. Data races and memory errors in lock-free code are rare,
  # load- and hardware-dependent, and almost impossible to catch by eye; sanitizers are how
  # we keep them honest on every push. (Sanitizers are a GCC/Clang + Linux toolchain feature,
  # so these run on ubuntu only.) The deque's ordering argument: docs/design/work-stealing-deque.md.

  sanitize-address:
    name: sanitizer (ASan + UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: |
          pip install "conan>=2,<3"
          conan profile detect --force

      # ASan+UBSan runs the FULL suite, including the Vulkan rhi tests on lavapipe, so it needs
      # the same windowing dev libs (to build) and Vulkan runtime (to run) as the build job.
      # RIME_REQUIRE_VULKAN=1 makes "no device" a failure rather than a silent skip.
      - name: Install Linux deps (windowing + Vulkan runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev libwayland-bin wayland-protocols \
            mesa-vulkan-drivers libvulkan1 vulkan-tools vulkan-validationlayers
          echo "RIME_REQUIRE_VULKAN=1" >> "$GITHUB_ENV"

      # -DRIME_SANITIZER=address (via --sanitizer) turns on ASan+UBSan for every engine target.
      # -fno-sanitize-recover=all (set in CMakeLists) makes any UBSan finding abort with a
      # nonzero exit; ASan/LSan likewise abort on a bad access or leak — so a finding fails CI.
      - name: Build & test (ASan + UBSan)
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: ./scripts/build.sh --cpp-only --sanitizer address

  sanitize-thread:
    name: sanitizer (TSan, Clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Install Clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: |
          pip install "conan>=2,<3"
          conan profile detect --force

      # TSan runs the pure-CPU suites — rime_core_tests (deque + JobSystem), rime_ecs_tests
      # (M4.4a's par_for_each over chunks, the first real multicore load on top of the deque), and
      # rime_assets_tests (M6.5's AssetServer, which fans asset loads out across the JobSystem) — all
      # GPU-free, so no Vulkan runtime is needed. It still *configures* the whole tree, and the
      # platform module hard-requires X11 + Wayland at configure time, so those dev libs must be
      # present.
      - name: Install Linux deps (windowing, to configure)
        run: |
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev libwayland-bin wayland-protocols

      # Why Clang, not GCC: GCC's ThreadSanitizer treats a standalone atomic_thread_fence as a
      # no-op (it emits -Wtsan) and so cannot model the happens-before the deque's fences
      # establish — it would UNDER-check the exact code we care about. Clang's TSan models the
      # fences, so it is the meaningful run. (See the RIME_SANITIZER block in /CMakeLists.txt.)
      #
      # Why the two-profile split (host=Clang, build=GCC): our code must be built with Clang so
      # TSan can instrument it (host profile). But glslang — the offline shader compiler — is a
      # build-context *tool* we never run in this job; pinning the build profile to GCC lets
      # Conan reuse its prebuilt glslang instead of compiling it from source under Clang. fmt,
      # the one compiled host dependency core pulls in, builds in seconds. We then build only the
      # rime_core_tests + rime_ecs_tests + rime_assets_tests targets (rime_ecs and rime_assets depend
      # only on rime::core [+ rime::platform]), which keeps viewer/rhi code out of the Clang -Werror
      # path.
      - name: Configure + build core + ecs tests (Clang, TSan)
        run: |
          CC=clang CXX=clang++ conan profile detect --name clang --force
          # Pin the host profile's compiler executables so Conan builds host-profile deps (fmt)
          # with Clang, not the default gcc. Without this, Conan configures fmt with /usr/bin/c++
          # while injecting Clang's -stdlib flag, and the fmt build fails ("unrecognized
          # command-line option -stdlib=libstdc++"). Build-context tools (glslang) stay on gcc.
          printf '[conf]\ntools.build:compiler_executables={"c": "clang", "cpp": "clang++"}\n' \
            >> "$(conan profile path clang)"
          conan install . -of build/dev -s build_type=Debug -s compiler.cppstd=20 \
            -pr:h clang -pr:b default --build=missing
          CC=clang CXX=clang++ cmake -S . -B build/dev -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/build/dev/conan_toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Debug -DRIME_SANITIZER=thread
          CC=clang CXX=clang++ cmake --build build/dev --target rime_core_tests rime_ecs_tests \
            rime_assets_tests

      # halt_on_error=1 stops at the first race with a nonzero exit, so a regression fails fast.
      - name: Run core + ecs + assets tests under TSan
        env:
          TSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build/dev -R 'rime_core_tests|rime_ecs_tests|rime_assets_tests'
          --output-on-failure

  lint:
    name: format, lint & license
    runs-on: ubuntu-latest # style/lint are OS-independent — check once.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Pinned so formatting is deterministic and matches what we run locally.
      - name: Install clang-format
        run: pip install "clang-format==20.1.8"

      - name: C++ formatting (clang-format)
        run: find engine tests \( -name '*.cpp' -o -name '*.hpp' -o -name '*.mm' \) -exec clang-format --dry-run --Werror {} +

      - name: Rust formatting (cargo fmt)
        working-directory: tools
        run: cargo fmt --all -- --check

      - name: Rust lints (clippy)
        working-directory: tools
        run: cargo clippy --all-targets -- -D warnings

      - name: License headers (SPDX)
        run: ./scripts/check-license-headers.sh
